name: Deploy to Staging

on:
  push:
    branches: [develop]

jobs:
  qa_release_gate:
    name: QA staging gate (strict)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: drs
          POSTGRES_PASSWORD: drs_test
          POSTGRES_DB: drs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt -r requirements-test.txt

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Ensure vite binary executable
        run: chmod +x frontend/node_modules/.bin/vite

      - name: Verify frontend toolchain runtime
        run: |
          test -x frontend/node_modules/.bin/vite
          test -f frontend/node_modules/vite/dist/node/cli.js
          test -f frontend/node_modules/typescript/bin/tsc

      - name: Run strict QA P2 gate
        env:
          DATABASE_URL: postgresql+asyncpg://drs:drs_test@localhost/drs_test
          REDIS_URL: redis://localhost:6379
          QA_STRICT_RELEASE: '1'
        run: make qa-p2

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: qa_release_gate
    environment: staging

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging server
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/drs
            git pull origin develop
            export ENV=staging
            make deploy-staging

      - name: Smoke test
        run: |
          sleep 30
          curl -f ${{ secrets.STAGING_URL }}/health || exit 1

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} DRS deployed to staging",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*DRS Staging Deployment*\nStatus: ${{ job.status }}\nCommit: ${{ github.sha }}"
                  }
                }
              ]
            }
