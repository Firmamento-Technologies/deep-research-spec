name: CI

on:
  push:
    branches: [main, struct]
  pull_request:
    branches: [main, struct]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check src/ tests/

  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt mypy types-PyYAML types-redis
      - run: mypy src/ --ignore-missing-imports --no-error-summary || true

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: drs_test
          POSTGRES_USER: drs
          POSTGRES_PASSWORD: drs_test_pw
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U drs"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run tests with coverage
        run: python -m pytest tests/ -v --tb=short -x --timeout=60 --cov=src --cov-report=xml --cov-report=term
        env:
          PYTHONPATH: .
          OPENROUTER_API_KEY: "test-key-ci"
          DATABASE_URL: "postgresql://drs:drs_test_pw@localhost:5432/drs_test"
      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

