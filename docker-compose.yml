# =============================================================================
# DRS Infrastructure — Docker Compose
# PostgreSQL 16, Redis 7, MinIO, Backend, Frontend,
# Prometheus, Grafana
#
# Usage:
#   Development: docker-compose up
#   Production:  docker-compose -f docker-compose.yml -f docker-compose.prod.yml up
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: drs-postgres
    environment:
      POSTGRES_DB: drs
      POSTGRES_USER: drs
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-drs_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drs -d drs"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: drs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
    networks:
      - backend_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # MinIO (S3-compatible object storage)
  # ---------------------------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: drs-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-drs_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-drs_secret_key}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    command: server /data --console-address ":9001"
    networks:
      - backend_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Backend API
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runtime
      cache_from:
        - type=local,src=/tmp/.buildx-cache
      args:
        BUILDKIT_INLINE_CACHE: 1
    image: drs-backend:latest
    container_name: drs-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://drs:${POSTGRES_PASSWORD:-drs_dev_password}@postgres:5432/drs
      REDIS_URL: redis://redis:6379
      MINIO_URL: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-drs_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-drs_secret_key}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ALLOWED_ORIGINS: "http://localhost:3001,http://localhost:3000,http://frontend:80"
      DEBUG: ${DEBUG:-false}
      MAX_CONCURRENT_RUNS: ${MAX_CONCURRENT_RUNS:-5}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - backend_net
      - frontend_net
      - monitoring_net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Frontend (Next.js / React + Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      cache_from:
        - type=local,src=/tmp/.buildx-cache-frontend
      args:
        VITE_API_BASE_URL: ""
        BUILDKIT_INLINE_CACHE: 1
    image: drs-frontend:latest
    container_name: drs-frontend
    ports:
      - "3001:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - frontend_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Prometheus
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: drs-prometheus
    ports:
      - "9091:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - monitoring_net
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Grafana
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: drs-grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/drs.json
    ports:
      - "3002:3000"
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./config/grafana_dashboard.json:/var/lib/grafana/dashboards/drs.json:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - monitoring_net
    restart: unless-stopped


# =============================================================================
# Volumes
# =============================================================================
volumes:
  pg_data:
  redis_data:
  minio_data:
  prometheus_data:
  grafana_data:


# =============================================================================
# Networks
# =============================================================================
networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  monitoring_net:
    driver: bridge
