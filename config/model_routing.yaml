# Model routing configuration for Deep Research System
# All models routed through OpenRouter (single API key)
# Format: openrouter/<provider>/<model>
#
# OpenRouter model list: https://openrouter.ai/models
# Presets: economy | balanced | premium

# ── Writer ──────────────────────────────────────────────────────────────────
writer:
  economy:  "openrouter/anthropic/claude-3-5-haiku"
  balanced: "openrouter/anthropic/claude-sonnet-4"
  premium:  "openrouter/anthropic/claude-opus-4-5"

# ── Researcher ──────────────────────────────────────────────────────────────
researcher:
  economy:  "openrouter/google/gemini-2.5-flash"
  balanced: "openrouter/google/gemini-2.5-flash"
  premium:  "openrouter/google/gemini-2.5-pro"

