# =============================================================================
# Docker Compose Override — Development
#
# Applied automatically when running: docker-compose up
# Enables hot-reload, debug mode, and extra port exposures.
# =============================================================================

services:

  backend:
    # Hot-reload: mount source code directly
    volumes:
      - ./backend:/app
      - ./src:/app/src   # root-level src/ for LangGraph nodes
    environment:
      DEBUG: "true"
      RELOAD: "true"
    # Override CMD for hot-reload
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    # No resource limits in dev
    deploy:
      resources:
        limits: {}
        reservations: {}

  frontend:
    # Dev server
    build:
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    # Mount source for hot-reload (if using Vite dev server)
    # volumes:
    #   - ./frontend:/app
    #   - /app/node_modules   # preserve container's node_modules

  postgres:
    # Expose extra port for local DB tools (pgAdmin, DBeaver)
    ports:
      - "5432:5432"
    # Enable query logging in dev
    command: >
      postgres
      -c log_statement=all
      -c log_duration=on
      -c log_min_duration_statement=100

  redis:
    # Redis Insight compatible
    ports:
      - "6379:6379"
